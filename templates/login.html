{% extends "first.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<style>

    .center-container{
        display:flex;
        justify-content:center;
        align-items:center;
        height:80vh;
    }

    .login-box{
        width:350px;
        padding:30px;
        border-radius:12px;
        background:white;
        box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        text-align:center;
    }

    .login-box h2{
        color:#4d4d7b;
        margin-bottom:20px;
    }

    .login-box input[type="text"],
    .login-box input[type="password"]{

        width:90%;
        padding:10px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:6px;
        font-size:15px;
    }

    .login-box input[type="submit"]{

        width:95%;
        padding:10px;
        background:#4d4d7b;
        color:white;
        border:none;
        border-radius:6px;
        cursor:pointer;
        font-size:16px;
    }

    .login-box input[type="submit"]:hover{
        background:#33335c;
    }

    .error{
        color:red;
        margin-top:10px;
    }

    .signup-text{
        margin-top:15px;
    }

</style>

<div class="center-container">

    <div class="login-box">

        <h2>Login Here</h2>

        <form action="/signin" method="post">

            <input type="text"
                   name="username"
                   placeholder="Enter Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   required>

            <input type="submit" value="Sign In">

        </form>

        {% if info %}
            <p class="error">{{info}}</p>
        {% endif %}

        <hr style="margin:20px 0;">

        <div class="signup-text">

            <p>Don't have an account?</p>

            <form action="/signup">

                <input type="submit" value="Signup">

            </form>

        </div>

    </div>

</div>

{% endblock %}
