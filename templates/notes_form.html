s{% extends "first.html" %}

{% block title %}Notes Form{% endblock %}

{% block content %}

<style>
body {
    background-color: #f4f6f9;
    font-family: Arial, sans-serif;
}

.container {
    width: 85%;
    margin: auto;
    margin-top: 30px;
    background: rgb(193, 215, 250);
    padding: 30px;
    border-radius: 10px;
    box-shadow: 1px 0px 10px rgba(21, 53, 7, 0.1);
}

h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
}

label {
    font-size: 18px;
    font-weight: bold;
}

input[type="text"] {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    margin-top: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

textarea {
    width: 100%;
    height: 400px; /* ~70% feel */
    padding: 12px;
    font-size: 16px;
    border-radius: 5px;
    border: 1px solid #ccc;
    resize: vertical;
}

.buttons {
    text-align: center;
    margin-top: 20px;
}

input[type="submit"], input[type="reset"] {
    padding: 10px 25px;
    font-size: 16px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

input[type="submit"] {
    background-color: #4CAF50;
    color: white;
}

input[type="reset"] {
    background-color: #f03bc2;
    color: white;
}

.error {
    color: red;
    margin-top: 5px;
}
</style>

<div class="container">
    <h2>Enter Your Notes</h2>

    <form action="/notes_form" method="post">

        <label for="title">Title</label>
        <input type="text" name="title" required value="{{ re_title }}">
        <div class="error">{{ info }}</div>

        <br>

        <label for="notes">Notes</label>
        <textarea name="notes" required>{{ re_notes }}</textarea>

        <div class="buttons">
            <input type="reset" value="Clear">
            &nbsp;&nbsp;&nbsp;
            <input type="submit" value="Save">
        </div>

    </form>
</div>

{% endblock %}
