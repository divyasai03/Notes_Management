{% extends "first.html" %}

{% block title %}Signup{% endblock %}

{% block content %}

<style>

.center-container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
}

.signup-box{
    width:350px;
    padding:30px;
    border-radius:12px;
    background:white;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
    text-align:center;
}

.signup-box h2{
    color:#4d4d7b;
    margin-bottom:20px;
}

.signup-box input[type="text"],
.signup-box input[type="password"]{

    width:90%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

.signup-box input[type="submit"]{

    width:95%;
    padding:10px;
    background:#4d4d7b;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

.signup-box input[type="submit"]:hover{
    background:#33335c;
}

.error{
    color:red;
    margin-top:10px;
}

.login-text{
    margin-top:15px;
}

</style>

<div class="center-container">

    <div class="signup-box">

        <h2>Create Account</h2>

        <form action="/signup" method="post">

            <input type="text"
                   name="username"
                   placeholder="Choose Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Choose Password"
                   required>

            <input type="text"
                   name="profile_name"
                   placeholder="Profile Name"
                   required>

            <input type="submit" value="Register">

        </form>

        {% if info %}
            <p class="error">{{info}}</p>
        {% endif %}

        <hr style="margin:20px 0;">

        <div class="login-text">

            <p>Already have an account?</p>

            <form action="/signin">

                <input type="submit" value="Login">

            </form>

        </div>

    </div>

</div>

{% endblock %}
